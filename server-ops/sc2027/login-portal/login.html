<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nortiqa Lab - Acceso</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #111820;
      --panel-2: #16212b;
      --text: #eef3f7;
      --muted: #9fb0bd;
      --line: #263542;
      --accent: #3dd6a3;
      --accent-2: #f2c14e;
      --danger: #ff6b6b;
      --focus: #7dd3fc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 420px);
    }

    .brand {
      margin-bottom: 22px;
    }

    .mark {
      font-size: 12px;
      line-height: 1.1;
      letter-spacing: 0;
      color: var(--accent);
      white-space: pre;
      font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
    }

    h1 {
      margin: 16px 0 6px;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    form {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 0 0 8px;
    }

    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      padding: 0 13px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.18);
    }

    .field {
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #07110d;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
    }

    button:disabled {
      cursor: progress;
      opacity: 0.72;
    }

    .status {
      min-height: 22px;
      margin: 14px 0 0;
      font-size: 14px;
      color: var(--muted);
    }

    .status.error { color: var(--danger); }
    .status.success { color: var(--accent); }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent-2);
      margin-right: 7px;
    }
  </style>
</head>
<body>
  <main>
    <section class="brand" aria-label="Nortiqa Lab">
      <div class="mark">NORTIQA
LAB</div>
      <h1>Acceso operativo</h1>
      <p class="subtitle">Ingreso privado al entorno Nortiqa Lab.</p>
    </section>

    <form id="login-form" autocomplete="on">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="username" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>

      <button id="submit" type="submit">Entrar</button>
      <p id="status" class="status" role="status" aria-live="polite"></p>

      <div class="meta">
        <span><span class="dot"></span>SC2027</span>
        <span>HTTPS activo</span>
      </div>
    </form>
  </main>

  <script>
    const form = document.querySelector("#login-form");
    const submit = document.querySelector("#submit");
    const statusEl = document.querySelector("#status");

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`.trim();
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus("");
      submit.disabled = true;
      submit.textContent = "Validando...";

      const payload = {
        email: form.email.value.trim(),
        password: form.password.value
      };

      try {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok || !data.success) {
          throw new Error(data.message || "No se pudo iniciar sesion");
        }

        localStorage.setItem("nortiqa_user", JSON.stringify(data.user || {}));
        localStorage.setItem("nortiqa_login_at", new Date().toISOString());
        setStatus("Acceso correcto. Redirigiendo...", "success");
        window.location.assign("/app/");
      } catch (error) {
        setStatus(error.message || "Credenciales invalidas", "error");
      } finally {
        submit.disabled = false;
        submit.textContent = "Entrar";
      }
    });
  </script>
</body>
</html>
